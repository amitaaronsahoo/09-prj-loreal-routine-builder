<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Oréal AI Routine Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>L'Oréal Routine Builder</h1>
            <button id="rtl-toggle" class="btn-secondary">Toggle RTL (عربي)</button>
        </div>
    </header>

    <main class="container">
        <!-- Sidebar: Product Selection -->
        <section class="products-section">
            <div class="controls">
                <input type="text" id="product-search" placeholder="Search products by name or keyword...">
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="skincare">Skincare</option>
                    <option value="haircare">Haircare</option>
                    <option value="makeup">Makeup</option>
                    <option value="fragrance">Fragrance</option>
                </select>
            </div>

            <div id="product-grid" class="grid">
                <!-- Products dynamically injected here -->
            </div>
        </section>

        <!-- Right Panel: Selected & Chat -->
        <section class="sidebar-right">
            <div class="selected-products">
                <h2>Your Selections</h2>
                <ul id="selected-list">
                    <!-- Selected items injected here -->
                </ul>
                <button id="clear-all" class="btn-secondary hidden">Clear All</button>
            </div>

            <div class="chat-container">
                <div id="chat-window" class="chat-window">
                    <div class="message ai">
                        Hi! Select some products from the left and click "Generate Routine" to get started!
                    </div>
                </div>
                <div class="chat-controls">
                    <button id="generate-routine" class="btn-primary" disabled>Generate Routine</button>
                    <div class="follow-up-box">
                        <input type="text" id="chat-input" placeholder="Ask a follow-up question..." disabled>
                        <button id="send-msg" class="btn-primary" disabled>Send</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
